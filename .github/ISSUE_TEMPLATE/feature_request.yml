name: Feature request
description: Propose a focused macOS administration or DDM workflow improvement.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the administrator problem or limitation.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Proposed workflow
      description: Explain how the feature should work from the user's perspective.
    validations:
      required: true
  - type: textarea
    id: relevance
    attributes:
      label: Relevance to macOS administration or DDM
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe existing tools or workflows you considered.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: This request contains no credentials, proprietary application data, internal URLs, or sensitive signing material.
          required: true
